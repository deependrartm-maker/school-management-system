{% extends 'dashboard/base.html' %}
{% load static %}

{% block content %}
<div class="container">
    <h2>Edit Student</h2>
    <form method="POST" action="{% url 'edit_student' student.id %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>Admission No:</label>
            <input type="text" name="admission_no" value="{{ student.admission_no }}" required>
        </div>
        <div class="form-group">
            <label>Roll No:</label>
            <input type="text" name="roll_no" value="{{ student.roll_no }}" required>
        </div>
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" name="full_name" value="{{ student.full_name }}" required>
        </div>
        <div class="form-group">
            <label>Class:</label>
            <input type="text" name="class_name" value="{{ student.class_name }}" required>
        </div>
        <div class="form-group">
            <label>Section:</label>
            <input type="text" name="section" value="{{ student.section }}" required>
        </div>
        <div class="form-group">
            <label>Father Name:</label>
            <input type="text" name="father_name" value="{{ student.father_name }}" required>
        </div>
        <div class="form-group">
            <label>Mother Name:</label>
            <input type="text" name="mother_name" value="{{ student.mother_name }}" required>
        </div>
        <div class="form-group">
            <label>Mobile Number:</label>
            <input type="text" name="mobile_number" value="{{ student.mobile_number }}" required>
        </div>
        <div class="form-group">
            <label>DOB:</label>
            <input type="date" name="dob" value="{{ student.dob }}" required>
        </div>
        <div class="form-group">
            <label>Gender:</label>
            <select name="gender">
                <option value="Male" {% if student.gender == 'Male' %}selected{% endif %}>Male</option>
                <option value="Female" {% if student.gender == 'Female' %}selected{% endif %}>Female</option>
                <option value="Other" {% if student.gender == 'Other' %}selected{% endif %}>Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Address:</label>
            <textarea name="address" required>{{ student.address }}</textarea>
        </div>
        <button type="submit" class="btn">Update Student</button>
    </form>
</div>
{% endblock %}
