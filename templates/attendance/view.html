{% extends "dashboard/base.html" %}
{% block content %}
<h2>Attendance – {{ student.admission_no }}</h2>

<table border="1" cellpadding="6">
  <tr>
    <th>Date</th>
    <th>Status</th>
  </tr>
  {% for r in records %}
  <tr>
    <td>{{ r.date }}</td>
    <td>{{ r.get_status_display }}</td>
  </tr>
  {% empty %}
  <tr><td colspan="2">No records</td></tr>
  {% endfor %}
</table>
{% endblock %}
