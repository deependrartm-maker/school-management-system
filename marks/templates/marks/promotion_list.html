<!DOCTYPE html>
<html>
<head>
    <title>Promotion List</title>
</head>
<body>

<h2>Promotion Records</h2>

<form method="GET">
    <label>Class:</label>
    <input type="text" name="class_name">
    <label>Exam:</label>
    <input type="text" name="exam_name">
    <button type="submit">Filter</button>
</form>

<br>

<table border="1" cellpadding="5">
    <tr>
        <th>Admission No</th>
        <th>Class</th>
        <th>Exam</th>
        <th>Percentage</th>
        <th>Status</th>
        <th>Promoted To</th>
    </tr>

    {% for record in records %}
    <tr>
        <td>{{ record.student.admission_no }}</td>
        <td>{{ record.class_name }}</td>
        <td>{{ record.exam_name }}</td>
        <td>{{ record.total_percentage }}%</td>
        <td>{{ record.final_status }}</td>
        <td>{{ record.promoted_to_class }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
